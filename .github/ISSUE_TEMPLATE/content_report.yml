name: Content report
description: Report a missing song or album, a failed load, or a bad match.
title: "Content report: "
labels:
  - content
body:
  - type: dropdown
    id: kind
    attributes:
      label: What went wrong?
      options:
        - Failed to load
        - Missing or wrong match
        - Something else
    validations:
      required: true
  - type: input
    id: item
    attributes:
      label: Song or album
      description: e.g. Take Care — Drake, or the search you tried
      placeholder: Song/album name and artist
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Anything else? (optional)
      description: What did you expect instead?
    validations:
      required: false
